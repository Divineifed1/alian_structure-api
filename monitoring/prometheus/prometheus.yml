# Prometheus scrape configuration for the Alian Structure API.
#
# Drop this file into your Prometheus server's configuration path or include
# it from the main prometheus.yml with:
#
#   scrape_configs:
#     - job_name: 'alian-structure-api'
#       file_sd_configs:
#         - files: ['/etc/prometheus/conf.d/alian-structure-api.yml']
#
# Adjust hosts/ports/intervals to match your environment.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'alian-structure-monitor'

# A dedicated alerting/recording-rules file can be referenced here. See
# monitoring/prometheus/alerts.yml.example for a starter SLO alert set.
rule_files:
  # - "alerts.yml"

scrape_configs:
  - job_name: 'alian-structure-api'
    metrics_path: '/api/v1/observability/metrics'
    scheme: 'http'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      # Update these targets to point at your running API instances.
      # The `job` label value is exposed to Grafana via the $job variable
      # in the application-overview dashboard.
      - targets:
          - 'localhost:3001'
        labels:
          job: 'alian-structure-api'
          environment: 'development'

      - targets:
          - 'api.alian-structure.example.com:443'
        labels:
          job: 'alian-structure-api'
          environment: 'production'
